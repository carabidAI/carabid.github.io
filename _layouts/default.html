<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}" />
</head>
<body class="page-stealth">
  <div class="noise" aria-hidden="true"></div>
  <div class="grid-bg" aria-hidden="true"></div>

  <header class="header header-stealth">
    <a href="{{ '/' | relative_url }}" class="logo">{{ site.title }}</a>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="footer footer-stealth">
    <span class="footer-logo">{{ site.title }}</span>
    <p class="footer-tagline">Stealth</p>
  </footer>

  <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
</body>
</html>
