<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="grid-bg" aria-hidden="true"></div>

  <header class="header">
    <a href="{{ '/' | relative_url }}" class="logo">{{ site.title }}</a>
  </header>

  <main>
    <article class="legal">
      <div class="legal-header">
        <h1 class="legal-title">{{ page.title }}</h1>
        <p class="legal-effective">Effective date: {{ page.effective_date }}</p>
      </div>
      <div class="legal-body">
        {{ content }}
      </div>
    </article>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-logo">{{ site.title }}</span>
      <nav class="footer-links">
        <a href="{{ '/privacy' | relative_url }}">Privacy Policy</a>
        <a href="{{ '/terms' | relative_url }}">Terms of Service</a>
      </nav>
      <p class="footer-copy">&copy; {{ 'now' | date: '%Y' }} Carabid AI Inc. All rights reserved.</p>
    </div>
  </footer>

  <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
</body>
</html>
