# Jekyll configuration for Carabid (GitHub Pages + custom domain)
title: Carabid
description: "Enabling AI agents — without giving up privacy."
baseurl: ""
url: "https://carabid.ai"

# GitHub Pages uses Jekyll 3.9.x; keep compatible
markdown: kramdown
highlighter: rouge

# Build
permalink: pretty
future: false

# Exclude from processing (vendor prevents Jekyll from reading gem site_template)
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - vendor
  - node_modules
